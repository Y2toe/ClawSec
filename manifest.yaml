name: clawsec
version: 1.0.0
description: Basic security checker for OpenClaw installations
author: ClawSec Security
source: clawsec
type: synchronous
entry: src/index.js
method: runCheck

permissions:
  - file_read
  - network_info

triggers:
  - phrase: "Run ClawSec check"
  - phrase: "Check my OpenClaw security"
  - phrase: "Security scan"
  - event: startup
    args:
      failOnCritical: false

config_schema:
  openclaw:
    configPath:
      type: string
      default: "~/.openclaw/config.yaml"
    skillsDir:
      type: string
      default: "~/.openclaw/skills"
    gatewayConfigPath:
      type: string
      default: "~/.openclaw/gateway.yaml"
    defaultPort:
      type: number
      default: 18789
  versionCheck:
    online:
      type: boolean
      default: false
    feedUrl:
      type: string
      default: "https://clawsec.github.io/vuln-feed.json"
  checks:
    portExposure:
      type: boolean
      default: true
    authConfig:
      type: boolean
      default: true
    version:
      type: boolean
      default: true
    skillAudit:
      type: boolean
      default: true
    websocketSecurity:
      type: boolean
      default: true
    hookLoading:
      type: boolean
      default: true
    sandboxIsolation:
      type: boolean
      default: true
    credentialStorage:
      type: boolean
      default: true
